<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多选释义模式 — 效果展示</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 50%, #F0F4FF 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  color: #1E1B4B;
}
.container {
  width: 430px;
  max-width: 100%;
  min-height: 800px;
  background: #fff;
  border-radius: 28px;
  box-shadow: 0 8px 40px rgba(79,70,229,0.10);
  overflow: hidden;
  border: 2px solid #E0E7FF;
}

/* Mode switch */
.mode-bar {
  display: flex;
  padding: 8px;
  gap: 4px;
  background: #fff;
  border-bottom: 2px solid #E0E7FF;
}
.mode-btn {
  flex: 1;
  padding: 10px 12px;
  border: 2px solid transparent;
  border-radius: 14px;
  background: transparent;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: #818CF8;
  transition: all 0.2s;
}
.mode-btn.active {
  background: #5B5FEF;
  color: #fff;
}
.mode-btn:hover:not(.active) {
  background: #EEF2FF;
}

/* Content */
.content {
  padding: 32px 24px;
  min-height: 600px;
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Word display */
.word-display {
  text-align: center;
  margin-bottom: 12px;
}
.word-english {
  font-family: 'Baloo 2', cursive;
  font-size: 30px;
  font-weight: 800;
  color: #1E1B4B;
  letter-spacing: 0.5px;
}
.word-hint {
  font-size: 13px;
  color: #EF4444;
  margin-top: 6px;
  font-weight: 600;
}

/* Options */
.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 28px;
}
.option {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  border: 3px solid #E0E7FF;
  border-radius: 18px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 500;
  transition: all 0.15s;
  user-select: none;
  background: #fff;
}
.option:hover {
  border-color: #818CF8;
  background: #FAFBFF;
}
.option.selected {
  border-color: #5B5FEF;
  background: #EEF2FF;
  box-shadow: 0 0 0 3px rgba(91,95,239,0.12);
}
.option.correct-reveal {
  border-color: #22C55E;
  background: #ECFDF5;
  color: #15803D;
}
.option.wrong-reveal {
  border-color: #EF4444;
  background: #FEF2F2;
  color: #B91C1C;
}
.option.missed-reveal {
  border-color: #F59E0B;
  background: #FFFBEB;
  color: #B45309;
}

.checkbox {
  width: 26px;
  height: 26px;
  border-radius: 8px;
  border: 3px solid #C7D2FE;
  background: #fff;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.option.selected .checkbox {
  background: #5B5FEF;
  border-color: #5B5FEF;
}
.option.selected .checkbox::after {
  content: '✓';
  color: #fff;
  font-size: 14px;
  font-weight: 700;
}
.option.correct-reveal .checkbox {
  background: #22C55E;
  border-color: #22C55E;
}
.option.correct-reveal .checkbox::after {
  content: '✓';
  color: #fff;
  font-size: 14px;
  font-weight: 700;
}
.option.wrong-reveal .checkbox {
  background: #EF4444;
  border-color: #EF4444;
}
.option.wrong-reveal .checkbox::after {
  content: '✕';
  color: #fff;
  font-size: 14px;
  font-weight: 700;
}
.option.missed-reveal .checkbox {
  background: #F59E0B;
  border-color: #F59E0B;
}
.option.missed-reveal .checkbox::after {
  content: '!';
  color: #fff;
  font-size: 14px;
  font-weight: 700;
}

/* Submit button */
.submit-area {
  margin-top: 28px;
  text-align: center;
}
.btn-submit {
  padding: 14px 48px;
  background: #5B5FEF;
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(91,95,239,0.25);
}
.btn-submit:hover {
  background: #4F46E5;
  transform: translateY(-1px);
}
.btn-submit:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

/* Result message */
.result-msg {
  text-align: center;
  margin-top: 16px;
  font-weight: 700;
  font-size: 16px;
  min-height: 24px;
}
.result-msg.correct { color: #22C55E; }
.result-msg.partial { color: #F59E0B; }
.result-msg.wrong { color: #EF4444; }

/* Next button */
.btn-next {
  display: none;
  margin: 20px auto 0;
  padding: 12px 36px;
  background: #fff;
  color: #5B5FEF;
  border: 3px solid #C7D2FE;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-next:hover { background: #EEF2FF; }
.btn-next.show { display: block; }

/* Bottom tab bar */
.tab-bar {
  display: flex;
  border-top: 2px solid #E0E7FF;
  padding: 8px 0;
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  border: none;
  background: none;
  cursor: pointer;
  padding: 8px 4px;
  color: #818CF8;
  font-size: 11px;
  font-weight: 600;
}
.tab-item.active { color: #5B5FEF; }
.tab-icon { font-size: 20px; }

/* Legend */
.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 20px;
  padding: 12px 16px;
  background: #F8F9FC;
  border-radius: 14px;
  font-size: 12px;
  color: #666;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot {
  width: 14px; height: 14px;
  border-radius: 4px;
}
.legend-dot.correct { background: #22C55E; }
.legend-dot.wrong-pick { background: #EF4444; }
.legend-dot.missed { background: #F59E0B; }

/* Responsive */
@media (max-width: 460px) {
  .container { width: 100%; border-radius: 0; }
  .content { padding: 24px 16px; }
}
</style>
</head>
<body>

<div class="container">
  <!-- Mode switch -->
  <div class="mode-bar">
    <button class="mode-btn active" onclick="switchMode('single')">📝 单选题</button>
    <button class="mode-btn" onclick="switchMode('multi')">✅ 多选释义</button>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Tab bar -->
  <nav class="tab-bar">
    <button class="tab-item active"><span class="tab-icon">📝</span>答题</button>
    <button class="tab-item"><span class="tab-icon">❌</span>错题本</button>
    <button class="tab-item"><span class="tab-icon">⭐</span>收藏本</button>
    <button class="tab-item"><span class="tab-icon">⚙️</span>管理</button>
  </nav>
</div>

<script>
const SINGLE_DATA = {
  word: "profound",
  options: [
    { text: "监督，管理", correct: false },
    { text: "深刻的，极大的", correct: true },
    { text: "指导，指示", correct: false },
    { text: "冒犯，得罪", correct: false }
  ]
};

const MULTI_DATA = {
  word: "application",
  options: [
    { text: "申请", correct: true },
    { text: "用途", correct: true },
    { text: "应用软件", correct: true },
    { text: "指导方针", correct: false }
  ]
};

let currentMode = 'multi';
let selected = new Set();
let submitted = false;
let data = MULTI_DATA;

function switchMode(mode) {
  currentMode = mode;
  selected.clear();
  submitted = false;

  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode || b.textContent.includes(mode === 'single' ? '单选题' : '多选释义'));
  });

  data = mode === 'single' ? SINGLE_DATA : MULTI_DATA;
  render();
}

function toggleOption(index) {
  if (submitted) return;
  if (currentMode === 'single') {
    // Single select
    selected.clear();
    selected.add(index);
  } else {
    // Multi select
    if (selected.has(index)) {
      selected.delete(index);
    } else {
      selected.add(index);
    }
  }
  render();
}

function submit() {
  if (selected.size === 0) return;
  submitted = true;
  render();
}

function nextWord() {
  selected.clear();
  submitted = false;
  render();
}

function render() {
  const container = document.getElementById('content');
  const correctIds = data.options
    .map((o, i) => o.correct ? i : -1)
    .filter(i => i >= 0);

  let resultHTML = '';
  let resultClass = '';
  let showNext = false;

  if (submitted) {
    showNext = true;
    const userSelected = new Set(selected);
    const correctSet = new Set(correctIds);

    // Check which are correct
    const allCorrect = correctIds.every(i => userSelected.has(i));
    const noWrong = [...userSelected].every(i => correctSet.has(i));

    if (allCorrect && noWrong) {
      resultHTML = '✓ 完全正确！';
      resultClass = 'correct';
    } else if (allCorrect && !noWrong) {
      resultHTML = '⚠ 选对了全部正确释义，但多选了错误项';
      resultClass = 'partial';
    } else if (userSelected.size > 0 && [...userSelected].some(i => correctSet.has(i))) {
      resultHTML = '⚠ 部分正确，还有遗漏的正确释义';
      resultClass = 'partial';
    } else {
      resultHTML = '✗ 没有选中任何正确释义';
      resultClass = 'wrong';
    }
  }

  container.innerHTML = `
    <div class="word-display">
      <div class="word-english">${data.word}</div>
      ${currentMode === 'multi' && !submitted ? '<div class="word-hint">请选出所有正确的中文释义</div>' : ''}
      ${currentMode === 'single' && !submitted ? '<div class="word-hint" style="color:#6366F1">请选出正确的中文释义</div>' : ''}
    </div>

    <div class="options">
      ${data.options.map((opt, i) => {
        let cls = '';
        if (submitted) {
          if (opt.correct && selected.has(i)) cls = 'correct-reveal';
          else if (opt.correct && !selected.has(i)) cls = 'missed-reveal';
          else if (!opt.correct && selected.has(i)) cls = 'wrong-reveal';
        } else if (selected.has(i)) {
          cls = 'selected';
        }
        return `
          <div class="option ${cls}" onclick="toggleOption(${i})">
            <div class="checkbox"></div>
            <span>${opt.text}</span>
          </div>
        `;
      }).join('')}
    </div>

    <div class="submit-area">
      ${!submitted
        ? `<button class="btn-submit" onclick="submit()" ${selected.size === 0 ? 'disabled' : ''}>确认提交</button>`
        : ''
      }
      <div class="result-msg ${resultClass}">${resultHTML}</div>
      <button class="btn-next ${showNext ? 'show' : ''}" onclick="nextWord()">下一题 →</button>
    </div>

    ${submitted ? `
    <div class="legend">
      <div class="legend-item"><div class="legend-dot correct"></div> 选中且正确</div>
      <div class="legend-item"><div class="legend-dot missed"></div> 遗漏的正确项</div>
      <div class="legend-item"><div class="legend-dot wrong-pick"></div> 多选的错误项</div>
    </div>
    ` : ''}
  `;
}

render();
</script>
</body>
</html>
