<div style="padding: 24px; max-width: 500px; margin: 0 auto; font-family: -apple-system, sans-serif;">
  <h2 style="margin: 0 0 8px 0; font-size: 20px;">进度条设计方案</h2>
  <p style="color: #666; font-size: 13px; margin: 0 0 24px 0;">请选出你喜欢的方案（可以多选不同方案的组合元素）</p>

  <!-- Design A: Simple bar -->
  <div class="option-card" data-option="A" style="border: 3px solid #E0E7FF; border-radius: 18px; padding: 20px; margin-bottom: 16px; cursor: pointer; transition: all 0.2s; background: #fff;" onmouseover="this.style.borderColor='#818CF8'" onmouseout="if(!this.classList.contains('picked'))this.style.borderColor='#E0E7FF'" onclick="togglePick(this)">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
      <span style="background: #EEF2FF; color: #5B5FEF; padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 13px;">A</span>
      <span style="font-weight: 700; font-size: 16px;">简洁文字 + 进度条</span>
    </div>

    <!-- Mock quiz content -->
    <div style="background: #FAFBFF; border-radius: 14px; padding: 16px;">
      <div style="font-family: 'Baloo 2', cursive; font-size: 26px; font-weight: 800; text-align: center; color: #1E1B4B; margin-bottom: 16px;">profound</div>
      <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px;">
        <div style="padding: 14px 16px; border: 3px solid #E0E7FF; border-radius: 14px; font-size: 15px;">A. 监督，管理</div>
        <div style="padding: 14px 16px; border: 3px solid #E0E7FF; border-radius: 14px; font-size: 15px;">B. 深刻的，极大的</div>
        <div style="padding: 14px 16px; border: 3px solid #E0E7FF; border-radius: 14px; font-size: 15px;">C. 指导，指示</div>
        <div style="padding: 14px 16px; border: 3px solid #E0E7FF; border-radius: 14px; font-size: 15px;">D. 冒犯，得罪</div>
      </div>

      <!-- Design A: simple bar below options -->
      <div style="margin-top: 8px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; color: #818CF8;">
          <span>已完成</span>
          <span>15 / 423</span>
        </div>
        <div style="height: 8px; background: #E0E7FF; border-radius: 4px; overflow: hidden;">
          <div style="height: 100%; width: 3.5%; background: linear-gradient(90deg, #5B5FEF, #818CF8); border-radius: 4px; transition: width 0.5s ease;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Design B: Segmented milestones -->
  <div class="option-card" data-option="B" style="border: 3px solid #E0E7FF; border-radius: 18px; padding: 20px; margin-bottom: 16px; cursor: pointer; transition: all 0.2s; background: #fff;" onmouseover="this.style.borderColor='#818CF8'" onmouseout="if(!this.classList.contains('picked'))this.style.borderColor='#E0E7FF'" onclick="togglePick(this)">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
      <span style="background: #EEF2FF; color: #5B5FEF; padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 13px;">B</span>
      <span style="font-weight: 700; font-size: 16px;">里程碑分段 + 百分比</span>
    </div>

    <div style="background: #FAFBFF; border-radius: 14px; padding: 16px;">
      <div style="text-align: center; margin-bottom: 8px;">
        <span style="font-size: 28px; font-weight: 800; color: #5B5FEF;">3.5<span style="font-size: 16px;">%</span></span>
      </div>
      <div style="height: 10px; background: #E0E7FF; border-radius: 5px; overflow: hidden; margin-bottom: 10px;">
        <div style="height: 100%; width: 3.5%; background: linear-gradient(90deg, #5B5FEF, #22C55E); border-radius: 5px;"></div>
      </div>
      <div style="display: flex; justify-content: space-between; font-size: 11px; color: #C7D2FE;">
        <span>0</span>
        <span style="color: #818CF8;">▲ 15</span>
        <span>100</span>
        <span>200</span>
        <span>300</span>
        <span>423</span>
      </div>
    </div>
  </div>

  <!-- Design C: Card-style compact -->
  <div class="option-card" data-option="C" style="border: 3px solid #E0E7FF; border-radius: 18px; padding: 20px; margin-bottom: 16px; cursor: pointer; transition: all 0.2s; background: #fff;" onmouseover="this.style.borderColor='#818CF8'" onmouseout="if(!this.classList.contains('picked'))this.style.borderColor='#E0E7FF'" onclick="togglePick(this)">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
      <span style="background: #EEF2FF; color: #5B5FEF; padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 13px;">C</span>
      <span style="font-weight: 700; font-size: 16px;">卡片式徽章 + 进度环</span>
    </div>

    <div style="background: #FAFBFF; border-radius: 14px; padding: 16px;">
      <!-- Progress ring -->
      <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 16px;">
        <div style="position: relative; width: 52px; height: 52px; flex-shrink: 0;">
          <svg viewBox="0 0 36 36" style="width: 52px; height: 52px; transform: rotate(-90deg);">
            <circle cx="18" cy="18" r="15" fill="none" stroke="#E0E7FF" stroke-width="3"/>
            <circle cx="18" cy="18" r="15" fill="none" stroke="url(#grad3)" stroke-width="3"
              stroke-dasharray="94.2" stroke-dashoffset="90.9" stroke-linecap="round"/>
            <defs><linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#5B5FEF"/>
              <stop offset="100%" style="stop-color:#22C55E"/>
            </linearGradient></defs>
          </svg>
          <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #5B5FEF;">15</div>
        </div>
        <div>
          <div style="font-size: 11px; color: #818CF8; margin-bottom: 2px;">答题进度</div>
          <div style="font-size: 18px; font-weight: 700; color: #1E1B4B;">423 词中已完成 15 词</div>
          <div style="font-size: 12px; color: #C7D2FE; margin-top: 2px;">还需 408 词完成本轮</div>
        </div>
      </div>
    </div>
  </div>

  <p style="font-size: 12px; color: #999; text-align: center; margin-top: 16px;">点击卡片选中/取消，选择你喜欢的方案或元素组合</p>
</div>

<script>
function togglePick(card) {
  card.classList.toggle('picked');
  if (card.classList.contains('picked')) {
    card.style.borderColor = '#5B5FEF';
    card.style.background = '#F8F9FF';
    card.style.boxShadow = '0 0 0 3px rgba(91,95,239,0.12)';
  } else {
    card.style.borderColor = '#E0E7FF';
    card.style.background = '#fff';
    card.style.boxShadow = 'none';
  }
}
</script>
